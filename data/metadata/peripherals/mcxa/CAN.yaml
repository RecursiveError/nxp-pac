block/Wmb:
  description: 'Array of registers: WMB_CS, WMB_D03, WMB_D47, WMB_ID.'
  items:
  - name: wmb_cs
    description: Wake-Up Message Buffer.
    byte_offset: 0
    access: Read
    fieldset: WmbCs
  - name: wmb_id
    description: Wake-Up Message Buffer for ID.
    byte_offset: 4
    access: Read
    fieldset: WmbId
  - name: wmb_d03
    description: Wake-Up Message Buffer for Data 0-3.
    byte_offset: 8
    access: Read
    fieldset: WmbD03
  - name: wmb_d47
    description: Wake-Up Message Buffer Register Data 4-7.
    byte_offset: 12
    access: Read
    fieldset: WmbD47
