  - name: Preshift
    description: Store the pre-shift register state.
    value: 0
  - name: Postshift
    description: Store the post-shift register state.
    value: 1
enum/Pinins:
  bit_size: 1
  variants:
  - name: Pinsel
    description: PINSEL selects timer pin input and output.
    value: 0
  - name: Pinselplus1
    description: PINSEL + 1 selects the timer pin input; timer pin output remains selected by PINSEL.
    value: 1
enum/Psf:
  bit_size: 32
  variants:
  - name: Clr
    description: Clear.
    value: 0
  - name: Set
    description: Set.
    value: 1
enum/Sef:
  bit_size: 4
  variants:
  - name: Clr
    description: Clear.
    value: 0
  - name: Set
    description: Set.
    value: 1
enum/ShiftctlPincfg:
  bit_size: 2
  variants:
  - name: Disable
    description: Shifter pin output disabled.
    value: 0
  - name: OpendBidirouten
    description: Shifter pin open-drain or bidirectional output enable.
    value: 1
  - name: BidirOutdata
    description: Shifter pin bidirectional output data.
    value: 2
  - name: Output
    description: Shifter pin output.
    value: 3
enum/ShiftctlPinpol:
  bit_size: 1
  variants:
  - name: ActiveHigh
    description: Active high.
    value: 0
  - name: ActiveLow
    description: Active low.
    value: 1
enum/Smod:
  bit_size: 3
  variants:
  - name: Disable
    description: Disable.
    value: 0
  - name: Receive
    description: Receive mode; capture the current shifter content into SHIFTBUF on expiration of the timer.
    value: 1
  - name: Transmit
    description: Transmit mode; load SHIFTBUF contents into the shifter on expiration of the timer.
    value: 2
  - name: Matchstore
    description: Match Store mode; shifter data is compared to SHIFTBUF content on expiration of the timer.
    value: 4
  - name: Matchcont
    description: Match Continuous mode; shifter data is continuously compared to SHIFTBUF contents.
    value: 5
  - name: State
    description: State mode; SHIFTBUF contents store programmable state attributes.
    value: 6
  - name: Logic
    description: Logic mode; SHIFTBUF contents implement programmable logic lookup table.
    value: 7
enum/Ssf:
  bit_size: 4
  variants:
  - name: Clr
    description: Clear.
    value: 0
  - name: Set
    description: Set.
    value: 1
enum/Ssize:
  bit_size: 1
  variants:
  - name: Width32
    description: 32-bit.
    value: 0
  - name: Width24
    description: 24-bit.
    value: 1
enum/Sstart:
  bit_size: 2
  variants:
  - name: Value00
    description: Start bit disabled for Transmitter, Receiver, and Match Store modes; Transmitter mode loads data on enable.
    value: 0
  - name: Value01
    description: Start bit disabled for Transmitter, Receiver, and Match Store modes; Transmitter mode loads data on first shift.
    value: 1
  - name: Value10
    description: Transmitter mode outputs start bit value 0 before loading data on first shift; if start bit is not 0, Receiver and Match Store modes set error flag.
    value: 2
  - name: Value11
    description: Transmitter mode outputs start bit value 1 before loading data on first shift; if start bit is not 1, Receiver and Match Store modes set error flag.
    value: 3
enum/Sstop:
  bit_size: 2
  variants:
  - name: Value00
    description: Stop bit disabled for Transmitter, Receiver, and Match Store modes.
    value: 0
  - name: Value01
    description: Stop bit disabled for Transmitter, Receiver, and Match Store modes; when timer is in stop condition, Receiver and Match Store modes store receive data on the configured shift edge.
    value: 1
  - name: Value10
    description: Transmitter mode outputs stop bit value 0 in Match Store mode; if stop bit is not 0, Receiver and Match Store modes set error flag (when timer is in stop condition, these modes also store receive data on the configured shift edge).
    value: 2
  - name: Value11
    description: Transmitter mode outputs stop bit value 1 in Match Store mode; if stop bit is not 1, Receiver and Match Store modes set error flag (when timer is in stop condition, these modes also store receive data on the configured shift edge).
    value: 3
enum/TimctlPincfg:
  bit_size: 2
  variants:
  - name: Outdisable
    description: Timer pin output disabled.
    value: 0
  - name: OpendBidirouten
    description: Timer pin open-drain or bidirectional output enable.
    value: 1
  - name: BidirOutdata
    description: Timer pin bidirectional output data.
    value: 2
  - name: Output
    description: Timer pin output.
    value: 3
enum/TimctlPinpol:
  bit_size: 1
  variants:
  - name: ActiveHigh
    description: Active high.
    value: 0
  - name: ActiveLow
    description: Active low.
    value: 1
enum/Timdec:
  bit_size: 3
  variants:
  - name: FlexioClkShiftclkTmrOut
    description: Decrement counter on FLEXIO clock; shift clock equals timer output.
    value: 0
  - name: TrigEdgeShiftclkTmrOut
    description: Decrement counter on trigger input (both edges); shift clock equals timer output.
    value: 1
  - name: PinEdgeShiftclkTmrOut
    description: Decrement counter on pin input (both edges); shift clock equals pin input.
    value: 2
  - name: TrigEdgeShiftclkTrigIn
    description: Decrement counter on trigger input (both edges); shift clock equals trigger input.
    value: 3
  - name: FlexioClkDiv16ShiftclkTmrOut
    description: Decrement counter on FLEXIO clock divided by 16; shift clock equals timer output.
    value: 4
  - name: FlexioClkDiv256ShiftclkTmrOut
    description: Decrement counter on FLEXIO clock divided by 256; shift clock equals timer output.
    value: 5
  - name: PinRiseShiftclkPinIn
    description: Decrement counter on pin input (rising edge); shift clock equals pin input.
    value: 6
  - name: TrigRiseShiftclkTrigIn
    description: Decrement counter on trigger input (rising edge); shift clock equals trigger input.
    value: 7
enum/Timdis:
  bit_size: 3
  variants:
  - name: Never
    description: Timer never disabled.
    value: 0
  - name: TmrNminus1
    description: Timer disabled on timer n-1 disable.
    value: 1
  - name: TmrCmp
    description: Timer disabled on timer compare (upper 8 bits match and decrement).
    value: 2
  - name: TmrCmpTriglow
    description: Timer disabled on timer compare (upper 8 bits match and decrement) and trigger low.
    value: 3
  - name: PinEdge
    description: Timer disabled on pin rising or falling edge.
    value: 4
  - name: PinEdgeTrighi
    description: Timer disabled on pin rising or falling edge provided trigger is high.
    value: 5
  - name: TrigFalledge
    description: Timer disabled on trigger falling edge.
    value: 6
enum/Timena:
  bit_size: 3
  variants:
  - name: Enable
    description: Timer always enabled.
    value: 0
  - name: TmrNminus1En
    description: Timer enabled on timer n-1 enable.
    value: 1
  - name: TmrTrighiEn
    description: Timer enabled on trigger high.
    value: 2
  - name: TmrTrigPinHiEn
    description: Timer enabled on trigger high and pin high.
    value: 3
  - name: TmrPinriseEn
    description: Timer enabled on pin rising edge.
    value: 4
  - name: TmrPinriseTrighiEn
    description: Timer enabled on pin rising edge and trigger high.
    value: 5
  - name: TmrTrigriseEn
    description: Timer enabled on trigger rising edge.
    value: 6
  - name: TmrTrigedgeEn
    description: Timer enabled on trigger rising or falling edge.
    value: 7
enum/Timod:
