    value: 0
  - name: StateLogicParallel
    description: State, logic, and parallel modes supported.
    value: 1
  - name: Pinctrl
    description: Pin control registers supported.
    value: 2
  - name: StateLogicParallelPinctrl
    description: State, logic, and parallel modes, plus pin control registers supported.
    value: 3
